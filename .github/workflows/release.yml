name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build & package all platforms
        run: make release
        env:
          VERSION: ${{ github.ref_name }}

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/bipolar-${{ github.ref_name }}-darwin-amd64.tar.gz
            dist/bipolar-${{ github.ref_name }}-darwin-arm64.tar.gz
            dist/bipolar-${{ github.ref_name }}-linux-amd64.tar.gz
            dist/bipolar-${{ github.ref_name }}-linux-arm64.tar.gz
            dist/bipolar-${{ github.ref_name }}-windows-amd64.zip
